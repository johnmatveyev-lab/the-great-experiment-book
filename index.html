<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Great Experiment — America's First 250 Years</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--navy:#1B2440;--parch:#F6F1E5;--gold:#B58B3E;--red:#9E2B25}
*{margin:0;box-sizing:border-box}
body{background:var(--navy);color:var(--parch);font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{text-align:center;padding:26px 16px 10px}
header h1{font-size:clamp(22px,4vw,40px);letter-spacing:.04em;color:#E9C87B}
header .sub{font-size:clamp(12px,1.6vw,16px);letter-spacing:.35em;text-transform:uppercase;color:var(--parch);margin-top:6px}
header .stars{color:var(--red);letter-spacing:.5em;margin-top:8px;font-size:13px}
#book{display:flex;gap:4px;justify-content:center;align-items:center;padding:18px;max-width:98vw}
canvas{background:var(--parch);box-shadow:0 12px 60px rgba(0,0,0,.55);max-height:76vh;width:auto}
#controls{display:flex;gap:18px;align-items:center;padding:6px 0 30px;font-family:Arial,Helvetica,sans-serif}
button{background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:10px 22px;font-size:15px;font-weight:bold;cursor:pointer}
button:disabled{opacity:.35;cursor:default}
#pg{font-size:14px;letter-spacing:.15em;min-width:120px;text-align:center}
#dl{color:#E9C87B;font-size:13px;text-decoration:none;letter-spacing:.08em}
#loading{padding:60px;font-size:15px;letter-spacing:.2em}
@media (max-width:760px){#book{flex-direction:column}canvas{max-height:none;max-width:94vw}}
</style>
</head>
<body>
<header>
  <h1>THE GREAT EXPERIMENT</h1>
  <div class="sub">America&rsquo;s First 250 Years &middot; John Matveyev</div>
  <div class="stars">&#9733; &#9733; &#9733;</div>
</header>
<div id="loading">OPENING THE BOOK&hellip;</div>
<div id="book"></div>
<div id="controls" hidden>
  <button id="prev">&#8592; Back</button>
  <div id="pg"></div>
  <button id="next">Forward &#8594;</button>
  <a id="dl" href="book.pdf" download>Download PDF</a>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
let doc=null,page=1,rendering=false;
const book=document.getElementById('book'),pg=document.getElementById('pg');
const single=()=>innerWidth<760;
async function renderOne(n,scale){
  if(n<1||n>doc.numPages)return null;
  const p=await doc.getPage(n);
  const v=p.getViewport({scale:1});
  const s=Math.min(1600/v.width,(innerHeight*.76*2)/v.height)* (window.devicePixelRatio>1?1.4:1);
  const vp=p.getViewport({scale:s});
  const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
  await p.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  return c;
}
async function show(){
  if(rendering)return;rendering=true;
  book.innerHTML='';
  const pages=single()?[page]:(page===1?[1]:[page,page+1].filter(n=>n<=doc.numPages));
  for(const n of pages){const c=await renderOne(n);if(c)book.appendChild(c);}
  pg.textContent=pages.length>1?`Pages ${pages[0]}–${pages[pages.length-1]} of ${doc.numPages}`:`Page ${pages[0]} of ${doc.numPages}`;
  document.getElementById('prev').disabled=page<=1;
  document.getElementById('next').disabled=page+(single()?0:1)>=doc.numPages;
  rendering=false;
}
function step(d){
  if(single()){page=Math.min(Math.max(1,page+d),doc.numPages);}
  else if(d>0){page=page===1?2:Math.min(page+2,doc.numPages);}
  else{page=page<=2?1:page-2;}
  show();
}
document.getElementById('prev').onclick=()=>step(-1);
document.getElementById('next').onclick=()=>step(1);
addEventListener('keydown',e=>{if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1)});
pdfjsLib.getDocument({url:'book.pdf'}).promise.then(d=>{
  doc=d;document.getElementById('loading').remove();
  document.getElementById('controls').hidden=false;show();
});
</script>
</body>
</html>
